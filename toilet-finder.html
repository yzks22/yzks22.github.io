<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🚽 トイレ速攻ナビ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --warn: #ffd600;
    --text: #e8f4fd;
    --text-dim: #6b7fa3;
    --border: rgba(0,229,255,0.15);
    --shadow: 0 0 30px rgba(0,229,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 80px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 10px rgba(0,229,255,0.3); }
    50% { box-shadow: 0 0 25px rgba(0,229,255,0.7); }
  }

  .logo-text {
    font-size: 16px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* SOS Button */
  .sos-section {
    padding: 24px 20px;
    text-align: center;
  }

  .sos-btn {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 3px solid var(--accent2);
    background: radial-gradient(circle at 40% 40%, #2a1510, #1a0a05);
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    transition: transform 0.1s;
    box-shadow:
      0 0 0 8px rgba(255,107,53,0.08),
      0 0 0 16px rgba(255,107,53,0.04),
      0 8px 40px rgba(255,107,53,0.3);
  }

  .sos-btn:hover {
    box-shadow:
      0 0 0 8px rgba(255,107,53,0.15),
      0 0 0 20px rgba(255,107,53,0.08),
      0 8px 50px rgba(255,107,53,0.5);
  }

  .sos-btn:active {
    transform: scale(0.96);
  }

  .sos-btn.searching {
    border-color: var(--warn);
    animation: spin-border 1s linear infinite, throb 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 0 8px rgba(255,214,0,0.1), 0 8px 40px rgba(255,214,0,0.4);
  }

  @keyframes throb {
    from { transform: scale(1); }
    to { transform: scale(1.03); }
  }

  @keyframes spin-border {
    0% { border-color: var(--warn); }
    50% { border-color: var(--accent); }
    100% { border-color: var(--warn); }
  }

  .sos-emoji {
    font-size: 52px;
    line-height: 1;
    filter: drop-shadow(0 0 10px rgba(255,107,53,0.6));
  }

  .sos-label {
    font-size: 13px;
    font-weight: 900;
    color: var(--accent2);
    letter-spacing: 3px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .sos-sub {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Status bar */
  .status-bar {
    margin: 0 20px 16px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    min-height: 48px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 1s ease-in-out infinite; }
  .status-dot.found { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
  .status-dot.error { background: #f44336; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text { color: var(--text-dim); flex: 1; }
  .status-text strong { color: var(--text); }

  /* Filter chips */
  .filters {
    padding: 0 20px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: all 0.2s;
  }

  .chip.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Results */
  .results {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    cursor: pointer;
    transition: all 0.2s;
    animation: slide-in 0.3s ease forwards;
    opacity: 0;
    transform: translateY(10px);
    text-decoration: none;
    color: inherit;
    display: flex;
  }

  .result-card:hover {
    border-color: rgba(0,229,255,0.4);
    background: var(--surface2);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }

  @keyframes slide-in {
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:nth-child(1) { animation-delay: 0.05s; }
  .result-card:nth-child(2) { animation-delay: 0.1s; }
  .result-card:nth-child(3) { animation-delay: 0.15s; }
  .result-card:nth-child(4) { animation-delay: 0.2s; }
  .result-card:nth-child(5) { animation-delay: 0.25s; }

  .card-rank {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    width: 20px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .card-rank.first { color: var(--warn); font-weight: 700; }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .card-icon.nearest {
    background: rgba(255,214,0,0.1);
    border-color: rgba(255,214,0,0.3);
  }

  .card-body { flex: 1; min-width: 0; }

  .card-name {
    font-weight: 700;
    font-size: 15px;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .card-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .card-dist {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .card-dist.nearest { color: var(--warn); }

  .card-address {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.15);
    color: var(--text-dim);
  }

  .tag.open { background: rgba(76,175,80,0.1); border-color: rgba(76,175,80,0.3); color: #81c784; }
  .tag.barrier-free { background: rgba(33,150,243,0.1); border-color: rgba(33,150,243,0.3); color: #64b5f6; }

  .card-action {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    margin-top: 4px;
    transition: all 0.2s;
  }

  .card-action:hover {
    background: rgba(0,229,255,0.2);
    box-shadow: 0 0 10px rgba(0,229,255,0.3);
  }

  /* Empty / error states */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.7; }

  /* Map link button */
  .map-btn {
    display: block;
    margin: 16px 20px 0;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
  }

  .map-btn:hover {
    border-color: rgba(0,229,255,0.4);
    color: var(--accent);
  }

  /* Loading skeleton */
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: center;
    margin: 0 20px 12px;
  }

  .skel-box {
    border-radius: 10px;
    background: linear-gradient(90deg, var(--surface2) 25%, rgba(0,229,255,0.05) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skel-icon { width: 44px; height: 44px; flex-shrink: 0; }
  .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .skel-line { height: 12px; }
  .skel-line.short { width: 60%; }

  /* Urgency indicator */
  .urgency-bar {
    margin: 0 20px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .urgency-label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }

  .urgency-dots {
    display: flex;
    gap: 4px;
  }

  .urgency-dot {
    width: 24px;
    height: 6px;
    border-radius: 3px;
    background: var(--surface2);
    cursor: pointer;
    transition: background 0.2s;
  }

  .urgency-dot.active-1 { background: #4caf50; }
  .urgency-dot.active-2 { background: var(--warn); }
  .urgency-dot.active-3 { background: var(--accent2); }

  /* section label */
  .section-label {
    padding: 0 20px 10px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }

  /* bottom safe area */
  .bottom-pad { height: 40px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🚽</div>
      <div>
        <div class="logo-text">トイレナビ</div>
        <div class="logo-sub">EMERGENCY TOILET FINDER</div>
      </div>
    </div>
  </div>

  <!-- SOS Button -->
  <div class="sos-section">
    <button class="sos-btn" id="sosBtn" onclick="findToilets()">
      <div class="sos-emoji" id="sosEmoji">🆘</div>
      <div class="sos-label" id="sosLabel">今すぐ探す</div>
      <div class="sos-sub" id="sosSub">タップで周辺検索</div>
    </button>
  </div>

  <!-- Urgency -->
  <div class="urgency-bar">
    <div class="urgency-label">URGENCY</div>
    <div class="urgency-dots" id="urgencyDots">
      <div class="urgency-dot active-1" onclick="setUrgency(1)" title="余裕あり"></div>
      <div class="urgency-dot" onclick="setUrgency(2)" title="急ぎ"></div>
      <div class="urgency-dot" onclick="setUrgency(3)" title="緊急！"></div>
    </div>
    <div class="urgency-label" id="urgencyText" style="margin-left:4px;color:#4caf50">余裕あり</div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">上のボタンを押してトイレを検索</div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="chip active" onclick="toggleChip(this,'all')">🗺 すべて</div>
    <div class="chip" onclick="toggleChip(this,'open')">🟢 営業中</div>
    <div class="chip" onclick="toggleChip(this,'bf')">♿ バリアフリー</div>
    <div class="chip" onclick="toggleChip(this,'park')">🌳 公園</div>
    <div class="chip" onclick="toggleChip(this,'station')">🚃 駅</div>
    <div class="chip" onclick="toggleChip(this,'shop')">🏬 商業施設</div>
  </div>

  <!-- Results -->
  <div id="resultsArea"></div>

  <div class="bottom-pad"></div>
</div>

<script>
let userLat = null, userLng = null;
let urgency = 1;
let allResults = [];
let activeFilter = 'all';

function setUrgency(level) {
  urgency = level;
  const dots = document.querySelectorAll('.urgency-dot');
  const labels = ['余裕あり', '急ぎ', '🚨 緊急！'];
  const colors = ['#4caf50', '#ffd600', '#ff6b35'];
  dots.forEach((d, i) => {
    d.className = 'urgency-dot';
    if (i < level) d.classList.add(`active-${i+1 <= level ? level : i+1}`);
  });
  const t = document.getElementById('urgencyText');
  t.textContent = labels[level-1];
  t.style.color = colors[level-1];

  // Re-sort if we have results
  if (allResults.length > 0) renderResults(allResults);
}

function toggleChip(el, filter) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = filter;
  if (allResults.length > 0) renderResults(allResults);
}

async function findToilets() {
  const btn = document.getElementById('sosBtn');
  const emoji = document.getElementById('sosEmoji');
  const label = document.getElementById('sosLabel');
  const sub = document.getElementById('sosSub');
  const dot = document.getElementById('statusDot');
  const status = document.getElementById('statusText');

  // Start searching state
  btn.classList.add('searching');
  emoji.textContent = '📡';
  label.textContent = '検索中...';
  sub.textContent = '位置情報を取得中';
  dot.className = 'status-dot active';
  status.innerHTML = '<strong>現在地を取得中...</strong>';

  showSkeletons();

  // Get location
  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true, timeout: 10000
      })
    );
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    status.innerHTML = `<strong>現在地取得完了</strong> — OpenStreetMapを検索中...`;
    sub.textContent = 'トイレを検索中';
  } catch(e) {
    // Demo mode with Tokyo station coords
    userLat = 35.6812362;
    userLng = 139.7649361;
    status.innerHTML = `<strong>デモモード</strong> — 東京駅周辺のトイレを表示`;
    sub.textContent = 'デモデータ表示中';
  }

  // Query Overpass API (OpenStreetMap)
  try {
    const radius = urgency === 3 ? 300 : urgency === 2 ? 500 : 800;
    const query = `
      [out:json][timeout:10];
      (
        node["amenity"="toilets"](around:${radius},${userLat},${userLng});
        way["amenity"="toilets"](around:${radius},${userLat},${userLng});
      );
      out center 20;
    `;
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: query,
      headers: {'Content-Type': 'text/plain'}
    });

    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    allResults = processResults(data.elements);

    btn.classList.remove('searching');

    if (allResults.length === 0) {
      emoji.textContent = '😔';
      label.textContent = '見つからず';
      sub.textContent = '範囲を広げて再検索';
      dot.className = 'status-dot error';
      status.innerHTML = `<strong>${radius}m以内にデータなし</strong> — コンビニを試して`;
      showEmpty();
    } else {
      emoji.textContent = '✅';
      label.textContent = `${allResults.length}件発見！`;
      sub.textContent = '最寄りへ急いで！';
      dot.className = 'status-dot found';
      status.innerHTML = `<strong>${allResults.length}件のトイレ</strong>を${radius}m以内に発見`;
      renderResults(allResults);
    }
  } catch(e) {
    // Fallback demo data
    allResults = getDemoData();
    btn.classList.remove('searching');
    emoji.textContent = '✅';
    label.textContent = `${allResults.length}件発見！`;
    sub.textContent = 'デモデータを表示';
    dot.className = 'status-dot found';
    status.innerHTML = `<strong>デモデータ表示中</strong> (APIに接続できませんでした)`;
    renderResults(allResults);
  }
}

function processResults(elements) {
  return elements
    .map(el => {
      const lat = el.lat || el.center?.lat;
      const lng = el.lon || el.center?.lon;
      const tags = el.tags || {};
      const dist = haversine(userLat, userLng, lat, lng);
      return {
        name: tags.name || tags['name:ja'] || '公衆トイレ',
        lat, lng, dist,
        open: tags.opening_hours ? !isClosed(tags.opening_hours) : null,
        barrierFree: tags.wheelchair === 'yes' || tags['toilets:wheelchair'] === 'yes',
        fee: tags.fee === 'yes',
        male: tags['toilets:male'] !== 'no',
        female: tags['toilets:female'] !== 'no',
        address: tags['addr:full'] || tags['addr:city'] || '',
        type: inferType(tags),
      };
    })
    .filter(r => r.lat && r.lng)
    .sort((a, b) => a.dist - b.dist);
}

function isClosed(hours) {
  // Simplified: just check if "24/7"
  return hours === 'closed';
}

function inferType(tags) {
  const desc = JSON.stringify(tags).toLowerCase();
  if (desc.includes('station') || desc.includes('鉄道')) return 'station';
  if (desc.includes('park') || desc.includes('公園')) return 'park';
  if (desc.includes('shop') || desc.includes('mall')) return 'shop';
  return 'all';
}

function renderResults(results) {
  let filtered = results;
  if (activeFilter === 'open') filtered = results.filter(r => r.open !== false);
  if (activeFilter === 'bf') filtered = results.filter(r => r.barrierFree);
  if (activeFilter === 'park') filtered = results.filter(r => r.type === 'park');
  if (activeFilter === 'station') filtered = results.filter(r => r.type === 'station');
  if (activeFilter === 'shop') filtered = results.filter(r => r.type === 'shop');

  const area = document.getElementById('resultsArea');

  if (filtered.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🔍</div>
        <p>このフィルターに一致する<br>トイレが見つかりません</p>
      </div>`;
    return;
  }

  const typeEmoji = { station: '🚃', park: '🌳', shop: '🏬', all: '🚽' };

  const cards = filtered.slice(0, 10).map((r, i) => {
    const distStr = r.dist < 1000
      ? `${Math.round(r.dist)}m`
      : `${(r.dist/1000).toFixed(1)}km`;
    const walkMin = Math.round(r.dist / 80);
    const isNearest = i === 0;
    const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lng}&travelmode=walking`;

    const tags = [];
    if (r.open === true) tags.push('<span class="tag open">🟢 営業中</span>');
    if (r.barrierFree) tags.push('<span class="tag barrier-free">♿</span>');
    if (r.fee) tags.push('<span class="tag">💴 有料</span>');
    if (r.male) tags.push('<span class="tag">🚹</span>');
    if (r.female) tags.push('<span class="tag">🚺</span>');

    return `
      <a class="result-card" href="${mapsUrl}" target="_blank" rel="noopener">
        <div class="card-rank ${isNearest ? 'first' : ''}">${isNearest ? '★' : i+1}</div>
        <div class="card-icon ${isNearest ? 'nearest' : ''}">${typeEmoji[r.type]}</div>
        <div class="card-body">
          <div class="card-name">${r.name}</div>
          <div class="card-meta">
            <span class="card-dist ${isNearest ? 'nearest' : ''}">${distStr}</span>
            <span style="font-size:11px;color:var(--text-dim)">徒歩約${walkMin}分</span>
          </div>
          ${r.address ? `<div class="card-address">📍 ${r.address}</div>` : ''}
          ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
        </div>
        <div class="card-action">🗺</div>
      </a>`;
  }).join('');

  area.innerHTML = `
    <div class="section-label">📍 近くのトイレ — タップで道案内</div>
    <div class="results">${cards}</div>
  `;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
